[package]
name = "astrid-capsule-telegram"
version = "0.1.0"
description = "Telegram Bot frontend for Astrid OS — bridges the Telegram Bot API to the kernel IPC bus."
authors = ["Unicity Labs <info@unicity-labs.com>"]
astrid-version = ">=0.5.0"

[[component]]
id = "telegram"
file = "astrid_capsule_telegram.wasm"
type = "executable"
capabilities = { net = ["*"] }

[capabilities]
uplink = true
net = ["*"]
ipc_publish = [
    "user.v1.prompt",
    "client.v1.disconnect",
    "astrid.v1.request.*",
    "astrid.v1.elicit.response.*",
    "astrid.v1.approval.response.*",
    "registry.v1.get_providers",
    "registry.v1.set_active_model",
    "registry.v1.selection.*",
    "session.v1.request.*",
]
ipc_subscribe = [
    "agent.v1.response",
    "agent.v1.stream.delta",
    "astrid.v1.approval",
    "astrid.v1.capsules_loaded",
    "astrid.v1.elicit.*",
    "astrid.v1.onboarding.required",
    "astrid.v1.response.*",
    "registry.v1.response.*",
    "registry.v1.active_model_changed",
    "registry.v1.selection.*",
    "session.v1.response.*",
]

[env]
bot_token = { type = "secret", request = "Enter your Telegram Bot Token (from @BotFather)", placeholder = "123456:ABC-DEF..." }
allowed_user_ids = { type = "string", request = "Comma-separated Telegram user IDs allowed to use the bot (leave empty for unrestricted)", default = "" }
